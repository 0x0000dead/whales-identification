name: Metrics regression gate

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  metrics:
    name: Compute metrics on test_split
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0 libsm6 libxext6 libxrender-dev libgomp1

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pillow pydantic fastapi python-multipart httpx pytest

      - name: Run compute_metrics (sample)
        run: |
          python scripts/compute_metrics.py \
            --manifest data/test_split/manifest.csv \
            --output-json reports/metrics_latest.json \
            --output-md reports/METRICS.md \
            --sample-size 25
        continue-on-error: true

      - name: Compare against baseline
        if: hashFiles('reports/metrics_baseline.json') != ''
        run: |
          python -c "
          import json, sys
          baseline = json.load(open('reports/metrics_baseline.json'))
          latest = json.load(open('reports/metrics_latest.json'))
          tnr_drop = baseline['anti_fraud']['tnr'] - latest['anti_fraud']['tnr']
          tpr_drop = baseline['anti_fraud']['tpr'] - latest['anti_fraud']['tpr']
          if tnr_drop > 0.02:
              sys.exit(f'TNR regressed by {tnr_drop:.4f} (>0.02)')
          if tpr_drop > 0.02:
              sys.exit(f'TPR regressed by {tpr_drop:.4f} (>0.02)')
          print('Metrics within tolerance.')
          "

      - name: Upload metrics report
        uses: actions/upload-artifact@v4
        with:
          name: metrics-report
          path: |
            reports/metrics_latest.json
            reports/METRICS.md
