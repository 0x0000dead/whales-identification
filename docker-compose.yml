version: '3.8'

services:
  backend:
    image: ecomarine-backend:latest
    build:
      context: ./whales_be_service
      dockerfile: Dockerfile
      args:
        MODEL_DOWNLOAD_URL: "${MODEL_DOWNLOAD_URL:-}"
    container_name: ecomarine-be
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:8080,http://127.0.0.1:5173,http://127.0.0.1:8080}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - whale-net

  frontend:
    image: ecomarine-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND: "${VITE_BACKEND:-http://localhost:8000}"
    container_name: ecomarine-fe
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - whale-net

networks:
  whale-net:
    driver: bridge
