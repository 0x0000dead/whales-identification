services:
  backend:
    image: ecomarine-backend:latest
    build:
      context: ./whales_be_service
      dockerfile: Dockerfile
      args:
        MODEL_DOWNLOAD_URL: "${MODEL_DOWNLOAD_URL:-}"
    container_name: ecomarine-be
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:8080,http://127.0.0.1:5173,http://127.0.0.1:8080}
    # Named volumes keep model files between container restarts.
    # First boot downloads ~2 GB from HuggingFace; subsequent starts are instant.
    volumes:
      - ecomarine_models:/app/src/whales_be_service/models
      - ecomarine_resources:/app/src/whales_be_service/resources
      - ecomarine_configs:/app/src/whales_be_service/configs
      - ecomarine_reports:/app/reports
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s  # allow up to 5 min for first-boot model download
    networks:
      - whale-net

  frontend:
    image: ecomarine-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND: "${VITE_BACKEND:-http://localhost:8000}"
        NPM_REGISTRY: "${NPM_REGISTRY:-https://registry.npmjs.org}"
    container_name: ecomarine-fe
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - whale-net

networks:
  whale-net:
    driver: bridge

# Persistent volumes — survive `docker compose down`, removed only by `docker compose down -v`
volumes:
  ecomarine_models:
  ecomarine_resources:
  ecomarine_configs:
  ecomarine_reports:
