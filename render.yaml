services:
  # Frontend React — native static site (Vite build)
  # Backend is deployed on Fly.io: https://ecomarineai-backend.fly.dev
  - type: web
    name: ecomarineai-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_BACKEND
        value: https://ecomarineai-backend.fly.dev
