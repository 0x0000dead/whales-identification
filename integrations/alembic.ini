[alembic]
# Single-env Alembic configuration for EcoMarineAI prediction history.
# Run from the repository root:
#   cd integrations && alembic -c alembic.ini upgrade head
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# sqlalchemy.url is resolved at runtime from the DATABASE_URL env var — see env.py
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
