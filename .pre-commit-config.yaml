# See https://pre-commit.com for more information
repos:
  # Basic file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=10000']
      - id: check-merge-conflict
      - id: check-json
      - id: check-toml
      - id: debug-statements
      - id: mixed-line-ending

  # Ruff — replaces flake8 + isort + black + pylint
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff          # linter (replaces flake8, isort)
        args: [--fix]
      - id: ruff-format   # formatter (replaces black)

  # Type checking — strict for the inference subpackage
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --python-version=3.11]
        additional_dependencies:
          - pydantic>=2.0
          - types-PyYAML
          - types-requests
        files: ^whales_be_service/src/whales_be_service/inference/.*\.py$
        exclude: ^(tests|research)/

  # Security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]
        files: ^(whales_identify|whales_be_service)/.*\.py$
        exclude: ^(tests|research)/

  # Jupyter notebook cleanup
  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout
        files: \.ipynb$

  # Notebooks: lint with ruff via nbQA
  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.7.1
    hooks:
      - id: nbqa-ruff
        args: [--fix]

  # YAML / Markdown / JSON formatting
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.3.3
    hooks:
      - id: prettier
        types_or: [yaml, markdown, json]
        exclude: poetry.lock|reports/.*\.json

  # Docstring coverage
  - repo: https://github.com/econchick/interrogate
    rev: 1.7.0
    hooks:
      - id: interrogate
        args: [--config=pyproject.toml]
        pass_filenames: false
        files: ^whales_be_service/src/whales_be_service/inference/.*\.py$

default_language_version:
  python: python3.11

exclude: |
  (?x)^(
    \.git/|
    \.venv/|
    venv/|
    __pycache__/|
    \.pytest_cache/|
    \.mypy_cache/|
    \.eggs/|
    \.tox/|
    build/|
    dist/|
    .*\.egg-info/|
    node_modules/|
    frontend/node_modules/|
    models/|
    data/
  )
