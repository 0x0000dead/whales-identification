# EcoMarineAI — Pluggable model configuration.
# Switch the active model by setting `active_model` to one of the keys below.
# Metrics are NOT listed here on purpose: they are computed by
# scripts/compute_metrics.py and stored in reports/metrics_latest.json.

active_model: "effb4_arcface"

models:
  effb4_arcface:
    name: "EfficientNet-B4 ArcFace (production)"
    architecture: "EfficientNetArcFace"
    checkpoint: "whales_be_service/src/whales_be_service/models/efficientnet_b4_512_fold0.ckpt"
    encoder_classes: "whales_be_service/src/whales_be_service/models/encoder_classes.npy"
    species_map: "whales_be_service/src/whales_be_service/resources/species_map.csv"
    params:
      model_name: "tf_efficientnet_b4_ns"
      embedding_size: 512
      num_classes: 13837
      s: 30.0
      m: 0.50
    input_size: 512

  vit_l32:
    name: "Vision Transformer L/32 (legacy, deprecated)"
    architecture: "VisionTransformer"
    checkpoint: "models/model-e15.pt"
    deprecated: true
    deprecated_reason: "Checkpoint не публикуется в HF; модель заменена на effb4_arcface. Запись оставлена для воспроизведения экспериментов Stage 1."
    params:
      embed_dim: 784
      hidden_dim: 1568
      num_heads: 8
      num_layers: 6
      patch_size: 32
      num_channels: 3
      num_patches: 196
      num_classes: 15587
      dropout: 0.2
    input_size: 448

  vit_b16:
    name: "Vision Transformer B/16"
    architecture: "VisionTransformer"
    checkpoint: "models/vit_b16_best.bin"
    params:
      embed_dim: 768
      hidden_dim: 3072
      num_heads: 12
      num_layers: 12
      patch_size: 16
      num_channels: 3
      num_patches: 784
      num_classes: 15587
      dropout: 0.1
    input_size: 448

  efficientnet_b5:
    name: "EfficientNet-B5"
    architecture: "CetaceanIdentificationModel"
    checkpoint: "models/efficientnet_b5.pth"
    params:
      model_name: "tf_efficientnet_b5_ns"
      embedding_size: 512
      num_classes: 15587
      s: 30.0
      m: 0.50
      ls_eps: 0.0
      easy_margin: false
    input_size: 448

  efficientnet_b0:
    name: "EfficientNet-B0"
    architecture: "CetaceanIdentificationModel"
    checkpoint: "models/efficientnet_b0.pth"
    params:
      model_name: "tf_efficientnet_b0_ns"
      embedding_size: 512
      num_classes: 15587
      s: 30.0
      m: 0.50
      ls_eps: 0.0
      easy_margin: false
    input_size: 448

  resnet101:
    name: "ResNet-101"
    architecture: "CetaceanIdentificationModel"
    checkpoint: "models/resnet101.pth"
    params:
      model_name: "resnet101"
      embedding_size: 512
      num_classes: 15587
      s: 30.0
      m: 0.50
      ls_eps: 0.0
      easy_margin: false
    input_size: 448

  swin_t:
    name: "Swin Transformer"
    architecture: "CetaceanIdentificationModel"
    checkpoint: "models/swin_t_best.pth"
    params:
      model_name: "swin_tiny_patch4_window7_224"
      embedding_size: 512
      num_classes: 15587
      s: 30.0
      m: 0.50
      ls_eps: 0.0
      easy_margin: false
    input_size: 448

  # Ensemble (§3.6 Комплексная CV-архитектура). Opt-in: set
  # `active_model: ensemble` to enable the multi-stage pipeline instead of
  # single-model inference. Individual stages can be toggled via
  # `active_stages` without editing code.
  ensemble:
    name: "CLIP gate + EfficientNet-B4 ArcFace (+ YOLOv8 bbox)"
    architecture: "EnsemblePipeline"
    mode: ensemble
    stages: [clip_gate, effb4_arcface, yolov8_bbox]
    # yolov8_bbox is disabled by default until the weights ship on HF.
    # Once available, flip to [clip_gate, effb4_arcface, yolov8_bbox].
    active_stages: [clip_gate, effb4_arcface]
    min_confidence: 0.05
    stage_backends:
      clip_gate: "anti_fraud.AntiFraudGate"
      effb4_arcface: "identification.IdentificationModel"
      yolov8_bbox: "ensemble.YoloV8BboxStub"  # replaced once real weights land

preprocessing:
  normalization:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
    max_pixel_value: 255.0

inference:
  device: "auto"  # auto, cpu, cuda:0
  batch_size: 1

# Anti-fraud gate runs upstream of identification.
anti_fraud:
  model_name: "ViT-B-32"
  pretrained: "laion2b_s34b_b79k"
  # Calibrated threshold lives in
  # whales_be_service/src/whales_be_service/configs/anti_fraud_threshold.yaml
